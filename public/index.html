<!DOCTYPE html>
<html class="dark" lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
  <meta name="theme-color" content="#0a0a0a" />
  <title>Antigravity — Elevate Your Routine</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Hanken+Grotesk:wght@400;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css" />
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-tertiary": "#00390a",
            "inverse-on-surface": "#313030",
            "surface-container-high": "#2a2a2a",
            "primary-fixed-dim": "#adc6ff",
            "surface-variant": "#353534",
            "on-background": "#e5e2e1",
            "surface-container-low": "#1c1b1b",
            "background": "#131313",
            "on-error": "#690005",
            "on-primary": "#002e69",
            "primary-fixed": "#d8e2ff",
            "on-secondary-fixed": "#310048",
            "surface-tint": "#adc6ff",
            "surface-container-highest": "#353534",
            "secondary-container": "#7d01b1",
            "on-primary-fixed": "#001a41",
            "on-surface": "#e5e2e1",
            "surface-bright": "#3a3939",
            "surface-dim": "#131313",
            "on-tertiary-fixed": "#002204",
            "on-secondary-container": "#e5a9ff",
            "on-error-container": "#ffdad6",
            "on-tertiary-container": "#003208",
            "error-container": "#93000a",
            "tertiary-fixed": "#70ff76",
            "on-primary-fixed-variant": "#004493",
            "surface-container": "#201f1f",
            "primary": "#adc6ff",
            "tertiary": "#42e355",
            "inverse-primary": "#005bc1",
            "on-secondary": "#510074",
            "secondary-fixed-dim": "#e9b3ff",
            "on-secondary-fixed-variant": "#7200a3",
            "on-surface-variant": "#c1c6d7",
            "tertiary-container": "#00a82f",
            "secondary": "#e9b3ff",
            "outline": "#8b90a0",
            "tertiary-fixed-dim": "#42e355",
            "surface": "#131313",
            "error": "#ffb4ab",
            "secondary-fixed": "#f6d9ff",
            "surface-container-lowest": "#0e0e0e",
            "primary-container": "#4b8eff",
            "inverse-surface": "#e5e2e1",
            "outline-variant": "#414755",
            "on-tertiary-fixed-variant": "#005313",
            "on-primary-container": "#00285c"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "1rem",
            "xxl": "1.5rem",
            "full": "9999px"
          },
          "spacing": {
            "sm": "12px",
            "xs": "4px",
            "gutter": "16px",
            "xl": "64px",
            "base": "8px",
            "md": "24px",
            "lg": "40px",
            "container-padding": "20px"
          },
          "fontFamily": {
            "headline-md": ["Sora"],
            "label-caps": ["Hanken Grotesk"],
            "body-lg": ["Hanken Grotesk"],
            "body-md": ["Hanken Grotesk"],
            "stats-num": ["Sora"],
            "display-lg-mobile": ["Sora"],
            "display-lg": ["Sora"]
          },
          "fontSize": {
            "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
            "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700"}],
            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
            "stats-num": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
            "display-lg-mobile": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
          }
        },
      },
    }
  </script>
</head>
<body class="antialiased select-none font-body-md text-body-md overflow-x-hidden">

  <!-- ЭКРАН АВТОРИЗАЦИИ (AUTH SCREEN) -->
  <div id="auth" class="screen min-h-screen flex flex-col justify-center px-container-padding py-xl" hidden>
    <div class="w-full max-w-md mx-auto z-10">
      <div class="text-center mb-lg">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary/10 border border-primary/20 mb-md shadow-[0_0_15px_rgba(173,198,255,0.2)]">
          <span class="material-symbols-outlined text-4xl text-primary font-bold">fitness_center</span>
        </div>
        <h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface font-extrabold tracking-tight">Antigravity</h1>
        <p class="font-body-lg text-body-lg text-on-surface-variant opacity-80 mt-1">Откажись от гравитации. Совершенствуй рутину.</p>
      </div>

      <!-- Табы Вход / Регистрация -->
      <div class="flex bg-surface-container rounded-xl p-1 mb-md border border-white/5" id="authTabs">
        <button class="flex-1 py-3 text-center font-label-caps text-label-caps rounded-lg bg-primary text-on-primary shadow-lg active-interaction transition-all" data-action="login-tab" type="button">ВХОД</button>
        <button class="flex-1 py-3 text-center font-label-caps text-label-caps text-on-surface-variant rounded-lg active-interaction transition-all" data-action="register-tab" type="button">РЕГИСТРАЦИЯ</button>
      </div>

      <!-- Форма входа / регистрации -->
      <form id="authForm" class="glass-card rounded-xl p-md flex flex-col gap-sm">
        <div class="flex flex-col gap-2">
          <label for="emailInput" class="font-label-caps text-label-caps text-on-surface-variant">EMAIL</label>
          <input type="email" id="emailInput" placeholder="name@domain.com" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-semibold text-on-surface" required autocomplete="email" />
        </div>

        <div class="flex flex-col gap-2">
          <label for="passwordInput" class="font-label-caps text-label-caps text-on-surface-variant">ПАРОЛЬ</label>
          <input type="password" id="passwordInput" placeholder="Минимум 6 символов" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-semibold text-on-surface" required autocomplete="current-password" minlength="6" />
        </div>

        <div class="form-err text-center font-semibold text-error text-label-caps" id="authError"></div>

        <button type="submit" class="w-full py-4 bg-primary text-on-primary font-label-caps text-label-caps font-bold rounded-lg shadow-lg active-interaction hover:opacity-90 transition-all text-center block neon-glow-primary mt-2" id="authSubmitBtn">ВОЙТИ В СИСТЕМУ</button>
      </form>
    </div>
  </div>

  <!-- ЭКРАН ПРИЛОЖЕНИЯ (APP SHELL) -->
  <div id="app" class="screen min-h-screen flex flex-col" hidden>
    <!-- Top App Bar -->
    <header class="fixed top-0 w-full z-40 bg-background/70 backdrop-blur-xl border-b border-white/10 shadow-2xl shadow-black/40 flex justify-between items-center px-gutter h-16 max-w-7xl mx-auto">
      <div class="flex items-center gap-sm">
        <button id="backBtn" aria-label="Назад" class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden border border-white/10 transition-transform active:scale-95 duration-200 hidden" type="button">
          <span class="material-symbols-outlined text-primary font-bold">arrow_back</span>
        </button>
        <span class="font-headline-md text-headline-md font-bold text-primary tracking-tight" id="headerTitle">Antigravity</span>
      </div>
      <div class="flex items-center gap-md">
        <span class="font-label-caps text-label-caps text-on-surface-variant hidden sm:inline" id="userEmail"></span>
        <button id="logoutBtn" class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity active:scale-95 duration-200" type="button">logout</button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="view" class="pt-20 pb-28 px-container-padding min-h-screen max-w-lg mx-auto w-full flex-1"></main>

    <!-- Floating Action Button (FAB) -->
    <button id="fabBtn" class="fixed bottom-24 right-6 w-16 h-16 bg-primary text-on-primary rounded-2xl shadow-2xl flex items-center justify-center active:scale-90 transition-all z-30 border border-white/10 neon-glow-primary">
      <span class="material-symbols-outlined text-3xl font-bold">add</span>
    </button>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 z-40 rounded-t-xl bg-[#121212]/70 backdrop-blur-2xl border-t border-white/10 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] flex justify-around items-center h-20 pb-safe px-4">
      <!-- Home (Home Dashboard) -->
      <button class="tab flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary/80 active:scale-90 transition-all duration-200" data-tab="today" type="button">
        <span class="material-symbols-outlined text-2xl">calendar_today</span>
        <span class="font-label-caps text-label-caps mt-xs">Today</span>
      </button>
      <!-- Stats (Aggregate stats / reports) -->
      <button class="tab flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary/80 active:scale-90 transition-all duration-200" data-tab="stats" type="button">
        <span class="material-symbols-outlined text-2xl">bar_chart</span>
        <span class="font-label-caps text-label-caps mt-xs">Stats</span>
      </button>
      <!-- Habits (Activities CRUD list) -->
      <button class="tab flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-primary/80 active:scale-90 transition-all duration-200" data-tab="activities" type="button">
        <span class="material-symbols-outlined text-2xl">list_alt</span>
        <span class="font-label-caps text-label-caps mt-xs">Habits</span>
      </button>
    </nav>
  </div>

  <!-- МОДАЛЬНОЕ ОКНО СОЗДАНИЯ И РЕДАКТИРОВАНИЯ АКТИВНОСТИ -->
  <div id="activityModal" class="modal-back hidden" style="z-index: 100;">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle" class="font-headline-md text-headline-md text-on-surface">Новая привычка</h3>
        <button type="button" class="close-modal-btn font-bold text-3xl text-on-surface-variant hover:text-on-surface" id="closeModalBtn">&times;</button>
      </div>
      
      <form id="activityForm" class="modal-form">
        <input type="hidden" id="activityIdInput" />
        
        <div class="field">
          <label for="actNameInput" class="font-label-caps text-label-caps text-on-surface-variant">НАЗВАНИЕ</label>
          <input type="text" id="actNameInput" placeholder="Например: 💪 Подтягивания, 📚 Чтение" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-semibold text-on-surface" required />
        </div>

        <div class="row flex gap-4">
          <div class="field flex-1">
            <label for="actUnitInput" class="font-label-caps text-label-caps text-on-surface-variant">ЕД. ИЗМЕРЕНИЯ</label>
            <input type="text" id="actUnitInput" placeholder="страниц, повторов, мин" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-semibold text-on-surface" required />
          </div>
          <div class="field flex-1">
            <label for="actGoalInput" class="font-label-caps text-label-caps text-on-surface-variant">ДНЕВНАЯ ЦЕЛЬ</label>
            <input type="number" id="actGoalInput" placeholder="0" min="0" step="any" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-semibold text-on-surface" required />
          </div>
        </div>

        <div class="field">
          <label class="font-label-caps text-label-caps text-on-surface-variant mb-1 block">ЦВЕТОВАЯ ТЕМА</label>
          <div class="color-row" id="colorPicker"></div>
          <input type="hidden" id="actColorInput" value="#007aff" />
        </div>

        <div class="modal-actions pt-2 flex gap-4">
          <button type="button" class="icon-btn del flex-1 py-4 text-center font-bold text-error bg-error-container/20 hover:bg-error-container hover:text-white rounded-lg active-interaction transition-all font-label-caps text-label-caps" id="deleteActivityBtn" hidden>УДАЛИТЬ</button>
          <button type="button" class="ghost-btn flex-1 py-4 text-center font-bold text-on-surface-variant bg-white/5 border border-white/10 hover:bg-white/10 rounded-lg active-interaction transition-all font-label-caps text-label-caps" id="cancelModalBtn">ОТМЕНА</button>
          <button type="submit" class="primary-btn save flex-1 py-4 text-center font-bold text-on-primary bg-primary hover:opacity-90 rounded-lg active-interaction transition-all font-label-caps text-label-caps neon-glow-primary" id="saveActivityBtn">СОХРАНИТЬ</button>
        </div>
      </form>
    </div>
  </div>

  <!-- МОДАЛЬНОЕ ОКНО БЫСТРОГО ДОБАВЛЕНИЯ ЛОГА (FAB CLICK) -->
  <div id="logModal" class="modal-back hidden" style="z-index: 100;">
    <div class="modal">
      <div class="modal-header">
        <h3 class="font-headline-md text-headline-md text-on-surface">Добавить запись</h3>
        <button type="button" class="close-modal-btn font-bold text-3xl text-on-surface-variant hover:text-on-surface" id="closeLogModalBtn">&times;</button>
      </div>
      
      <form id="logForm" class="modal-form">
        <div class="field">
          <label for="logActivitySelect" class="font-label-caps text-label-caps text-on-surface-variant">ВЫБЕРИТЕ АКТИВНОСТЬ</label>
          <select id="logActivitySelect" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-semibold text-on-surface" required>
            <!-- Заполняется JS -->
          </select>
        </div>

        <div class="field">
          <label for="logAmountInput" class="font-label-caps text-label-caps text-on-surface-variant">КОЛИЧЕСТВО</label>
          <input type="number" id="logAmountInput" placeholder="Введите число..." min="0.01" step="any" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-semibold text-on-surface" required />
        </div>

        <div class="modal-actions pt-2 flex gap-4">
          <button type="button" class="ghost-btn flex-1 py-4 text-center font-bold text-on-surface-variant bg-white/5 border border-white/10 rounded-lg active-interaction transition-all font-label-caps text-label-caps" id="cancelLogModalBtn">ОТМЕНА</button>
          <button type="submit" class="primary-btn save flex-1 py-4 text-center font-bold text-on-primary bg-primary rounded-lg active-interaction transition-all font-label-caps text-label-caps neon-glow-primary">ЗАПИСАТЬ</button>
        </div>
      </form>
    </div>
  </div>

  <!-- УВЕДОМЛЕНИЯ TOAST -->
  <div id="toast" class="toast hidden"></div>

  <!-- Декоративные атмосферные неоновые сферы на заднем плане -->
  <div class="fixed top-[-10%] right-[-10%] w-[50%] h-[40%] bg-primary/5 blur-[120px] rounded-full z-[-1] pointer-events-none"></div>
  <div class="fixed bottom-[-10%] left-[-10%] w-[50%] h-[40%] bg-secondary/5 blur-[120px] rounded-full z-[-1] pointer-events-none"></div>

  <script src="/app.js"></script>
</body>
</html>
