<!DOCTYPE html>
<html class="light" lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
  <meta name="theme-color" content="#f5f5f7" />
  <title>Antigravity — Elevate Your Routine</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css" />

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-tint": "#005cbb",
            "on-error": "#ffffff",
            "secondary": "#006e1c",
            "surface-container-low": "#f6f3f5",
            "on-surface-variant": "#414753",
            "surface": "#fcf8fb",
            "tertiary-container": "#a842db",
            "primary": "#0059b5",
            "surface-container-high": "#eae7ea",
            "surface-variant": "#e4e2e4",
            "on-surface": "#1b1b1d",
            "on-primary": "#ffffff",
            "inverse-primary": "#abc7ff",
            "inverse-on-surface": "#f3f0f2",
            "surface-dim": "#dcd9dc",
            "on-secondary": "#ffffff",
            "surface-container-highest": "#e4e2e4",
            "primary-fixed": "#d7e2ff",
            "on-error-container": "#93000a",
            "outline-variant": "#c1c6d6",
            "on-background": "#1b1b1d",
            "primary-fixed-dim": "#abc7ff",
            "secondary-container": "#60fe6c",
            "surface-container": "#f0edef",
            "surface-container-lowest": "#ffffff",
            "error": "#ba1a1a",
            "error-container": "#ffdad6",
            "on-secondary-container": "#00731d",
            "background": "#fcf8fb",
            "outline": "#717785",
            "primary-container": "#0071e3",
            "surface-bright": "#fcf8fb",
            "inverse-surface": "#303032",
            "tertiary": "#8c21c0"
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
          spacing: { "xs": "4px", "sm": "12px", "base": "8px", "md": "24px", "gutter": "24px", "margin": "32px", "lg": "48px", "xl": "80px" },
          fontFamily: {
            "headline-md": ["Sora"], "body-md": ["Sora"], "label-md": ["Sora"],
            "headline-xl": ["Sora"], "headline-lg": ["Sora"], "label-sm": ["Sora"], "body-lg": ["Sora"]
          },
          fontSize: {
            "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
            "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
            "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "500"}],
            "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
            "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}],
            "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}]
          }
        }
      }
    }
  </script>
</head>
<body class="text-on-surface antialiased">

  <!-- ====================== ЭКРАН АВТОРИЗАЦИИ ====================== -->
  <div id="auth" class="screen min-h-screen flex flex-col justify-center items-center px-6 py-16 hidden">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/10 mb-5">
          <span class="material-symbols-outlined text-4xl text-primary">fitness_center</span>
        </div>
        <h1 class="text-headline-xl font-headline-xl text-on-surface">Antigravity</h1>
        <p class="text-body-lg font-body-lg text-on-surface-variant mt-1">Откажись от гравитации. Совершенствуй рутину.</p>
      </div>

      <div class="flex bg-surface-container rounded-xl p-1 mb-6 border border-outline-variant/40" id="authTabs">
        <button class="flex-1 py-3 text-center text-label-md font-label-md rounded-lg bg-primary text-on-primary shadow transition-all" data-action="login-tab" type="button">ВХОД</button>
        <button class="flex-1 py-3 text-center text-label-md font-label-md text-on-surface-variant rounded-lg transition-all" data-action="register-tab" type="button">РЕГИСТРАЦИЯ</button>
      </div>

      <form id="authForm" class="glass-panel rounded-2xl p-6 flex flex-col gap-4 shadow-xl">
        <div class="flex flex-col gap-2">
          <label for="emailInput" class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider">Email</label>
          <input type="email" id="emailInput" placeholder="name@domain.com" class="field-input" required autocomplete="email" />
        </div>
        <div class="flex flex-col gap-2">
          <label for="passwordInput" class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider">Пароль</label>
          <input type="password" id="passwordInput" placeholder="Минимум 6 символов" class="field-input" required autocomplete="current-password" minlength="6" />
        </div>
        <div class="text-center text-error text-label-md font-semibold min-h-[18px]" id="authError"></div>
        <button type="submit" class="w-full py-4 bg-primary text-on-primary text-label-md font-label-md font-semibold rounded-xl shadow-lg hover:opacity-90 active:scale-[0.98] transition-all" id="authSubmitBtn">ВОЙТИ В СИСТЕМУ</button>
      </form>
    </div>
  </div>

  <!-- ====================== ЭКРАН ПРИЛОЖЕНИЯ ====================== -->
  <div id="app" class="screen min-h-screen hidden">

    <!-- Мобильный топбар -->
    <header class="lg:hidden fixed top-0 inset-x-0 h-16 z-40 glass-panel border-b border-outline-variant/30 flex items-center justify-between px-4">
      <button id="sidebarToggle" type="button" class="w-10 h-10 rounded-xl flex items-center justify-center text-on-surface hover:bg-surface-container-high/60 active:scale-95 transition">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <span class="text-headline-md font-headline-md text-on-surface">Antigravity</span>
      <button id="logoutBtnMobile" type="button" class="w-10 h-10 rounded-xl flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high/60 active:scale-95 transition">
        <span class="material-symbols-outlined">logout</span>
      </button>
    </header>

    <!-- Затемнение под мобильный сайдбар -->
    <div id="sidebarBackdrop" class="lg:hidden fixed inset-0 bg-on-surface/30 backdrop-blur-sm z-40 hidden"></div>

    <!-- Сайдбар -->
    <aside id="sidebar" class="fixed left-0 top-0 h-screen w-72 bg-surface/80 backdrop-blur-3xl border-r border-outline-variant/30 flex flex-col gap-3 p-6 z-50 -translate-x-full lg:translate-x-0 transition-transform duration-300">
      <div class="mb-8 px-2">
        <h1 class="text-headline-lg font-headline-lg font-bold text-on-surface tracking-tight">Antigravity</h1>
        <p class="text-label-md font-label-md text-on-surface-variant">Habit Tracker</p>
      </div>

      <nav class="flex-1 flex flex-col gap-1" id="sideNav">
        <button class="nav-link" data-tab="today" type="button">
          <span class="material-symbols-outlined">calendar_today</span>
          <span class="text-label-md font-label-md">Today</span>
        </button>
        <button class="nav-link" data-tab="stats" type="button">
          <span class="material-symbols-outlined">bar_chart</span>
          <span class="text-label-md font-label-md">Stats</span>
        </button>
        <button class="nav-link" data-tab="activities" type="button">
          <span class="material-symbols-outlined">fitness_center</span>
          <span class="text-label-md font-label-md">Activities</span>
        </button>
      </nav>

      <div class="mt-auto flex flex-col gap-4">
        <button id="addHabitBtn" type="button" class="w-full py-4 bg-primary text-on-primary rounded-xl font-semibold shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-[20px]">add</span>
          <span class="text-label-md font-label-md">Add New Habit</span>
        </button>
        <div class="p-4 glass-panel rounded-2xl flex items-center justify-between gap-3 shadow-sm">
          <div class="flex items-center gap-3 min-w-0">
            <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary shrink-0">
              <span class="material-symbols-outlined">person</span>
            </div>
            <div class="min-w-0">
              <p class="text-label-md font-label-md font-bold truncate" id="userName">Hero</p>
              <p class="text-label-sm font-label-sm text-outline truncate" id="userEmail"></p>
            </div>
          </div>
          <button id="logoutBtn" type="button" class="w-9 h-9 rounded-lg flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high/60 active:scale-95 transition shrink-0" title="Выйти">
            <span class="material-symbols-outlined text-[20px]">logout</span>
          </button>
        </div>
      </div>
    </aside>

    <!-- Контент -->
    <main class="lg:ml-72 min-h-screen p-5 sm:p-margin max-w-[1440px] pt-20 lg:pt-margin" id="view"></main>

    <!-- FAB: быстрая запись -->
    <button id="fabBtn" type="button" class="fixed bottom-6 right-6 w-14 h-14 bg-primary text-on-primary rounded-2xl shadow-xl flex items-center justify-center active:scale-90 transition-all z-30" title="Быстрая запись">
      <span class="material-symbols-outlined text-3xl">bolt</span>
    </button>
  </div>

  <!-- ====================== МОДАЛКА ПРИВЫЧКИ ====================== -->
  <div id="activityModal" class="modal-back hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle" class="text-headline-md font-headline-md text-on-surface">Новая привычка</h3>
        <button type="button" class="text-3xl text-on-surface-variant hover:text-on-surface leading-none" id="closeModalBtn">&times;</button>
      </div>
      <form id="activityForm" class="modal-form">
        <input type="hidden" id="activityIdInput" />
        <div class="field">
          <label for="actNameInput" class="field-label">НАЗВАНИЕ</label>
          <input type="text" id="actNameInput" placeholder="Например: 💪 Подтягивания, 📚 Чтение" class="field-input" required />
        </div>
        <div class="flex gap-4">
          <div class="field flex-1">
            <label for="actUnitInput" class="field-label">ЕД. ИЗМЕРЕНИЯ</label>
            <input type="text" id="actUnitInput" placeholder="страниц, повторов, мин" class="field-input" required />
          </div>
          <div class="field flex-1">
            <label for="actGoalInput" class="field-label">ДНЕВНАЯ ЦЕЛЬ</label>
            <input type="number" id="actGoalInput" placeholder="0" min="0" step="any" class="field-input" required />
          </div>
        </div>
        <div class="field">
          <label class="field-label mb-1 block">ЦВЕТ</label>
          <div class="color-row" id="colorPicker"></div>
          <input type="hidden" id="actColorInput" value="#0059b5" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-danger flex-1" id="deleteActivityBtn" hidden>УДАЛИТЬ</button>
          <button type="button" class="btn-ghost flex-1" id="cancelModalBtn">ОТМЕНА</button>
          <button type="submit" class="btn-primary flex-1" id="saveActivityBtn">СОХРАНИТЬ</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ====================== МОДАЛКА ЛОГА ====================== -->
  <div id="logModal" class="modal-back hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 class="text-headline-md font-headline-md text-on-surface">Добавить запись</h3>
        <button type="button" class="text-3xl text-on-surface-variant hover:text-on-surface leading-none" id="closeLogModalBtn">&times;</button>
      </div>
      <form id="logForm" class="modal-form">
        <div class="field">
          <label for="logActivitySelect" class="field-label">АКТИВНОСТЬ</label>
          <select id="logActivitySelect" class="field-input" required></select>
        </div>
        <div class="field">
          <label for="logAmountInput" class="field-label">КОЛИЧЕСТВО</label>
          <input type="number" id="logAmountInput" placeholder="Введите число..." min="0.01" step="any" class="field-input" required />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-ghost flex-1" id="cancelLogModalBtn">ОТМЕНА</button>
          <button type="submit" class="btn-primary flex-1">ЗАПИСАТЬ</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/app.js"></script>
</body>
</html>
