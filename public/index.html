<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <script>
    // Анти-FOUC: применяем сохранённую тему до первой отрисовки. База — светлая.
    try { if (localStorage.getItem('antigravity-theme') === 'dark') document.documentElement.classList.add('dark'); } catch (e) {}
  </script>
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
  <title>Antigravity</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css" />

  <script id="tailwind-config">
    // Цвета — через CSS-переменные (RGB-триплеты), чтобы темы переключались мгновенно
    // и при этом работали утилиты прозрачности (bg-primary/10, text-on-surface/40 и т.д.).
    const tok = (v) => `rgb(var(--${v}) / <alpha-value>)`;
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": tok('primary'),
            "on-primary": tok('on-primary'),
            "primary-container": tok('primary-container'),
            "secondary": tok('secondary'),
            "secondary-container": tok('secondary-container'),
            "tertiary": tok('tertiary'),
            "error": tok('error'),
            "error-container": tok('error-container'),
            "background": tok('background'),
            "surface": tok('surface'),
            "surface-container-lowest": tok('surface-container-lowest'),
            "surface-container-low": tok('surface-container-low'),
            "surface-container": tok('surface-container'),
            "surface-container-high": tok('surface-container-high'),
            "surface-container-highest": tok('surface-container-highest'),
            "on-surface": tok('on-surface'),
            "on-surface-variant": tok('on-surface-variant'),
            "outline": tok('outline'),
            "outline-variant": tok('outline-variant')
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
          spacing: { "xs": "4px", "sm": "12px", "base": "8px", "md": "24px", "gutter": "24px", "margin": "32px", "lg": "48px", "xl": "80px" },
          fontFamily: {
            "headline-xl": ["Hanken Grotesk", "sans-serif"],
            "headline-lg": ["Hanken Grotesk", "sans-serif"],
            "headline-lg-mobile": ["Hanken Grotesk", "sans-serif"],
            "headline-md": ["Hanken Grotesk", "sans-serif"],
            "body-lg": ["Plus Jakarta Sans", "sans-serif"],
            "body-md": ["Plus Jakarta Sans", "sans-serif"],
            "label-lg": ["Plus Jakarta Sans", "sans-serif"],
            "label-md": ["Plus Jakarta Sans", "sans-serif"],
            "label-sm": ["Plus Jakarta Sans", "sans-serif"],
          },
          fontSize: {
            "headline-xl": ["44px", {"lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
            "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
            "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
            "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600"}],
            "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600"}],
            "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
          }
        }
      }
    }
  </script>
</head>
<body class="text-on-surface antialiased">

  <!-- ====================== ЭКРАН АВТОРИЗАЦИИ ====================== -->
  <div id="auth" class="screen min-h-screen flex flex-col justify-center items-center px-6 py-16 hidden">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/10 mb-5">
          <span class="material-symbols-outlined text-4xl text-primary">check_circle</span>
        </div>
        <h1 class="text-headline-xl font-headline-xl text-on-surface">Antigravity</h1>
        <p class="text-body-lg font-body-lg text-on-surface-variant mt-1" data-i18n="auth_subtitle">Track your habits. Perfect your routine.</p>
      </div>

      <div class="flex bg-surface-container rounded-xl p-1 mb-6 border border-outline-variant/40" id="authTabs">
        <button class="flex-1 py-3 text-center text-label-md font-label-md rounded-lg bg-primary text-on-primary shadow transition-all" data-action="login-tab" type="button" data-i18n="sign_in">SIGN IN</button>
        <button class="flex-1 py-3 text-center text-label-md font-label-md text-on-surface-variant rounded-lg transition-all" data-action="register-tab" type="button" data-i18n="sign_up">SIGN UP</button>
      </div>

      <form id="authForm" class="glass-panel rounded-2xl p-6 flex flex-col gap-4 shadow-xl">
        <div class="flex flex-col gap-2">
          <label for="emailInput" class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider" data-i18n="email">Email</label>
          <input type="email" id="emailInput" placeholder="name@domain.com" class="field-input" required autocomplete="email" />
        </div>
        <div class="flex flex-col gap-2">
          <label for="passwordInput" class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider" data-i18n="password">Password</label>
          <input type="password" id="passwordInput" placeholder="At least 6 characters" class="field-input" required autocomplete="current-password" minlength="6" />
        </div>
        <div id="turnstileBox" class="flex justify-center empty:hidden"></div>
        <div class="text-center text-error text-label-md font-semibold min-h-[18px]" id="authError"></div>
        <button type="submit" class="w-full py-4 bg-primary text-on-primary text-label-md font-label-md font-semibold rounded-xl shadow-lg hover:opacity-90 active:scale-[0.98] transition-all" id="authSubmitBtn" data-i18n="sign_in">SIGN IN</button>
      </form>

      <!-- Вход через Google (показывается, если настроен на бэкенде) -->
      <div id="googleAuth" class="hidden flex-col gap-4 mt-4">
        <div class="flex items-center gap-3 text-on-surface-variant/60 text-label-sm">
          <span class="flex-1 h-px bg-outline-variant/40"></span> <span data-i18n="or">or</span> <span class="flex-1 h-px bg-outline-variant/40"></span>
        </div>
        <a href="/api/auth/google" id="googleBtn" class="w-full py-4 glass-panel rounded-xl flex items-center justify-center gap-3 font-label-md text-label-md font-semibold text-on-surface hover:bg-surface-container-high/60 active:scale-[0.98] transition-all">
          <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          <span data-i18n="sign_in_google">Sign in with Google</span>
        </a>
      </div>
    </div>
  </div>

  <!-- ====================== ЭКРАН ПРИЛОЖЕНИЯ ====================== -->
  <div id="app" class="screen hidden">

    <!-- Сайдбар (десктоп ≥768px) -->
    <aside class="sidebar fixed left-0 top-0 h-screen w-60 bg-surface/80 backdrop-blur-3xl border-r border-outline-variant/30 flex-col gap-3 p-5 z-50">
      <div class="mb-6 px-1 flex items-start justify-between gap-2">
        <div class="min-w-0">
          <h1 class="text-headline-lg font-headline-lg font-bold text-primary tracking-tight">Antigravity</h1>
          <p class="text-label-sm font-label-sm text-on-surface-variant">Stay effortless</p>
        </div>
        <button id="notifBtnSide" type="button" class="icon-btn relative shrink-0" title="Today's motivation">
          <span class="material-symbols-outlined text-[22px]">notifications</span>
          <span class="notif-dot"></span>
        </button>
      </div>

      <nav class="flex-1 flex flex-col gap-1">
        <button class="nav-link" data-tab="today" type="button">
          <span class="material-symbols-outlined">calendar_today</span>
          <span class="text-label-md font-label-md" data-i18n="today">Today</span>
        </button>
        <button class="nav-link" data-tab="calendar" type="button">
          <span class="material-symbols-outlined">calendar_month</span>
          <span class="text-label-md font-label-md" data-i18n="calendar">Calendar</span>
        </button>
        <button class="nav-link" data-tab="stats" type="button">
          <span class="material-symbols-outlined">bar_chart</span>
          <span class="text-label-md font-label-md" data-i18n="stats">Stats</span>
        </button>
        <button class="nav-link" data-tab="profile" type="button">
          <span class="material-symbols-outlined">person</span>
          <span class="text-label-md font-label-md" data-i18n="profile">Profile</span>
        </button>
      </nav>

      <div class="mt-auto flex flex-col gap-4">
        <button id="gymModeBtnSide" type="button" class="w-full py-4 rounded-xl font-semibold shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-2 text-on-primary" style="background:linear-gradient(135deg, rgb(var(--primary)), rgb(var(--tertiary)));">
          <span class="material-symbols-outlined text-[22px]">exercise</span>
          <span class="text-label-md font-label-md" data-i18n="gym_mode">Gym Mode</span>
        </button>
        <div class="p-3 glass-panel rounded-2xl flex items-center justify-between gap-2 shadow-sm">
          <div class="flex items-center gap-2 min-w-0">
            <div class="w-9 h-9 rounded-full bg-primary/10 flex items-center justify-center text-primary shrink-0">
              <span class="material-symbols-outlined text-[20px]">person</span>
            </div>
            <div class="min-w-0">
              <p class="text-label-md font-label-md font-bold truncate" id="userName">Hero</p>
              <p class="text-label-sm font-label-sm text-outline truncate" id="userEmail"></p>
            </div>
          </div>
          <div class="flex items-center gap-1 shrink-0">
            <button id="themeToggleSide" type="button" class="icon-btn" title="Toggle theme">
              <span class="material-symbols-outlined text-[20px]">dark_mode</span>
            </button>
            <button id="logoutBtn" type="button" class="icon-btn" title="Sign out">
              <span class="material-symbols-outlined text-[20px]">logout</span>
            </button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Контент -->
    <main class="app-main">
      <!-- Верхняя панель (смартфоны): логотип + колокольчик уведомлений -->
      <header class="app-topbar">
        <div class="flex items-center gap-2 min-w-0">
          <span class="font-bold text-primary truncate" style="font-family:'Hanken Grotesk',sans-serif;font-size:20px;letter-spacing:-0.01em;">Antigravity</span>
        </div>
        <button id="notifBtn" type="button" class="icon-btn relative" title="Today's motivation">
          <span class="material-symbols-outlined text-[22px]">notifications</span>
          <span class="notif-dot"></span>
        </button>
      </header>
      <div id="view" class="content"></div>
    </main>

    <!-- Нижний таб-бар (смартфоны ≤767px): 5 элементов с центральной кнопкой Gym Mode -->
    <nav class="bottom-bar">
      <button class="bottom-tab" data-tab="today" type="button">
        <span class="material-symbols-outlined">calendar_today</span>
        <span data-i18n="today">Today</span>
      </button>
      <button class="bottom-tab" data-tab="calendar" type="button">
        <span class="material-symbols-outlined">calendar_month</span>
        <span data-i18n="calendar">Calendar</span>
      </button>
      <button id="gymModeBtnBar" class="bottom-fab" type="button" title="Gym Mode">
        <span class="material-symbols-outlined">exercise</span>
      </button>
      <button class="bottom-tab" data-tab="stats" type="button">
        <span class="material-symbols-outlined">bar_chart</span>
        <span data-i18n="stats">Stats</span>
      </button>
      <button class="bottom-tab" data-tab="profile" type="button">
        <span class="material-symbols-outlined">person</span>
        <span data-i18n="profile">Profile</span>
      </button>
    </nav>
  </div>

  <!-- ====================== МОДАЛКА ПРИВЫЧКИ ====================== -->
  <div id="activityModal" class="modal-back hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle" class="text-headline-md font-headline-md text-on-surface">New Habit</h3>
        <button type="button" class="text-3xl text-on-surface-variant hover:text-on-surface leading-none" id="closeModalBtn">&times;</button>
      </div>
      <form id="activityForm" class="modal-form">
        <input type="hidden" id="activityIdInput" />
        <div class="field">
          <label for="actNameInput" class="field-label" data-i18n="name">NAME</label>
          <input type="text" id="actNameInput" placeholder="e.g. 💪 Pull-ups, 🧘 Meditation" class="field-input" required />
        </div>

        <div class="field">
          <label class="field-label" data-i18n="habit_type">HABIT TYPE</label>
          <div class="seg" id="typeSeg">
            <button type="button" class="seg-btn active" data-type="numeric" data-i18n="numeric_type">📊 Numeric</button>
            <button type="button" class="seg-btn" data-type="simple" data-i18n="simple_type">✓ Simple</button>
          </div>
          <input type="hidden" id="actTypeInput" value="numeric" />
        </div>

        <!-- Поля только для численных привычек -->
        <div id="numericFields" class="flex flex-col gap-[18px]">
          <div class="flex gap-4">
            <div class="field flex-1">
              <label for="actUnitInput" class="field-label" data-i18n="unit_label">UNIT</label>
              <select id="actUnitInput" class="field-input">
                <option value="повторы">повторы</option>
                <option value="страницы">страницы</option>
                <option value="минуты">минуты</option>
                <option value="раз">раз</option>
                <option value="км">км</option>
                <option value="кг">кг</option>
                <option value="л">л</option>
              </select>
            </div>
            <div class="field flex-1">
              <label for="actGoalInput" class="field-label" data-i18n="daily_goal">DAILY GOAL</label>
              <input type="number" id="actGoalInput" placeholder="0" min="0" step="any" class="field-input" />
            </div>
          </div>
          <div class="field">
            <label class="field-label" data-i18n="quick_add_buttons">QUICK ADD BUTTONS</label>
            <div class="flex gap-3">
              <input type="number" id="actQa1Input" placeholder="+5" min="0" step="any" class="field-input text-center" />
              <input type="number" id="actQa2Input" placeholder="+10" min="0" step="any" class="field-input text-center" />
              <input type="number" id="actQa3Input" placeholder="+25" min="0" step="any" class="field-input text-center" />
            </div>
            <p class="text-label-sm font-label-sm text-on-surface-variant mt-1" data-i18n="quick_add_sub">Empty fields are hidden on the card.</p>
          </div>
        </div>

        <div class="field">
          <label class="field-label mb-1 block" data-i18n="emoji_label">EMOJI</label>
          <div class="flex gap-2 overflow-x-auto pb-2 custom-scrollbar" id="emojiPicker"></div>
          <input type="hidden" id="actEmojiInput" value="✨" />
        </div>

        <div class="field">
          <label class="field-label mb-1 block" data-i18n="color_label">COLOR</label>
          <div class="color-row" id="colorPicker"></div>
          <input type="hidden" id="actColorInput" value="#0059b5" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-danger flex-1" id="deleteActivityBtn" data-i18n="delete_btn" hidden>DELETE</button>
          <button type="button" class="btn-ghost flex-1" id="cancelModalBtn" data-i18n="cancel_btn">CANCEL</button>
          <button type="submit" class="btn-primary flex-1" id="saveActivityBtn" data-i18n="save_btn">SAVE</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ====================== МОДАЛКА ЛОГА ====================== -->
  <div id="logModal" class="modal-back hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 class="text-headline-md font-headline-md text-on-surface" data-i18n="add_log_title">Add Log</h3>
        <button type="button" class="text-3xl text-on-surface-variant hover:text-on-surface leading-none" id="closeLogModalBtn">&times;</button>
      </div>
      <form id="logForm" class="modal-form">
        <div class="field">
          <label for="logActivitySelect" class="field-label" data-i18n="activity_select">ACTIVITY</label>
          <select id="logActivitySelect" class="field-input" required></select>
        </div>
        <div class="field">
          <label for="logAmountInput" class="field-label" data-i18n="amount_label">AMOUNT</label>
          <input type="number" id="logAmountInput" placeholder="Enter a number..." min="0.01" step="any" class="field-input" required />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-ghost flex-1" id="cancelLogModalBtn" data-i18n="cancel_btn">CANCEL</button>
          <button type="submit" class="btn-primary flex-1" data-i18n="log">LOG</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ====================== МОДАЛКА МОТИВАЦИИ (Колокольчик) ====================== -->
  <div id="notifModal" class="modal-back hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 class="text-headline-md font-headline-md text-on-surface" data-i18n="motivation">Today's motivation</h3>
        <button type="button" class="text-3xl text-on-surface-variant hover:text-on-surface leading-none" id="closeNotifBtn">&times;</button>
      </div>
      <div class="flex flex-col items-center text-center gap-4 py-2">
        <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center animate-float">
          <span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings:'FILL' 1;">bolt</span>
        </div>
        <p id="notifText" class="text-body-lg font-body-lg text-on-surface px-2">Today is the best day to get 1% better.</p>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-primary flex-1" id="notifOkBtn" data-i18n="lets_go">Let's go 🚀</button>
      </div>
    </div>
  </div>

  <!-- ====================== ПОЛНОЭКРАННЫЙ GYM MODE (Тренировка) ====================== -->
  <div id="gymModal" class="gym-modal hidden">
    <div class="gym-sheet">
      <header class="gym-header">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1;">exercise</span>
          <h3 class="text-headline-md font-headline-md text-on-surface" data-i18n="workout">Workout</h3>
        </div>
        <button type="button" class="icon-btn" id="closeGymBtn" title="Close"><span class="material-symbols-outlined">close</span></button>
      </header>

      <div class="gym-body custom-scrollbar">
        <div class="field">
          <label for="gymExerciseSelect" class="field-label" data-i18n="exercise">EXERCISE</label>
          <select id="gymExerciseSelect" class="field-input">
            <option>Bench Press</option>
            <option>Barbell Squat</option>
            <option>Deadlift</option>
            <option>Lat Pulldown</option>
            <option>Seated Dumbbell Press</option>
            <option>Dumbbell Curl</option>
            <option>Pull-ups</option>
            <option>Leg Press</option>
          </select>
        </div>

        <div class="flex gap-4">
          <div class="field flex-1">
            <label for="gymWeightInput" class="field-label" data-i18n="weight">WEIGHT (KG)</label>
            <input type="number" id="gymWeightInput" placeholder="0" min="0" step="any" class="field-input text-center text-headline-md" />
          </div>
          <div class="field flex-1">
            <label for="gymRepsInput" class="field-label" data-i18n="reps">REPS</label>
            <input type="number" id="gymRepsInput" placeholder="0" min="0" step="1" class="field-input text-center text-headline-md" />
          </div>
        </div>

        <button type="button" class="btn-ghost w-full flex items-center justify-center gap-2" id="gymAddSetBtn">
          <span class="material-symbols-outlined text-[20px]">add</span> <span data-i18n="add_set">Add Set</span>
        </button>

        <div>
          <p class="field-label mb-2 block"><span data-i18n="sets_label">SETS</span> <span id="gymSetCount" class="text-primary"></span></p>
          <div id="gymSetList" class="flex flex-col gap-2"></div>
        </div>
      </div>

      <footer class="gym-footer">
        <button type="button" class="btn-primary w-full flex items-center justify-center gap-2" id="gymFinishBtn">
          <span class="material-symbols-outlined text-[20px]">flag</span> <span data-i18n="finish_workout">Finish Workout</span>
        </button>
      </footer>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/app.js"></script>
</body>
</html>
