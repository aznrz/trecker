<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070913" />
      <stop offset="100%" stop-color="#0e1124" />
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#262c5b" stroke-width="6"/>
  <!-- Chart Bars -->
  <rect x="110" y="280" width="64" height="140" rx="20" fill="url(#roseGrad)" />
  <rect x="224" y="200" width="64" height="220" rx="20" fill="url(#emeraldGrad)" />
  <rect x="338" y="120" width="64" height="300" rx="20" fill="url(#indigoGrad)" />
  <!-- Dynamic Line Curve -->
  <path d="M142 220 L256 140 L370 70" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="370" cy="70" r="16" fill="#ffffff" filter="url(#glow)" />
</svg>
